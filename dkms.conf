PACKAGE_NAME="rr2680"
PACKAGE_VERSION="2.2"

# Rebuild automatically whenever a new kernel is installed.
AUTOINSTALL="yes"

# The driver is built from product/rr2680/linux by its own makefile.
# DKMS exports kernel_source_dir (= /lib/modules/<kver>/build), which is
# exactly what the makefile expects in KERNELDIR.
MAKE[0]="make -C product/rr2680/linux KERNELDIR=${kernel_source_dir}"
CLEAN="make -C product/rr2680/linux clean"

BUILT_MODULE_NAME[0]="rr2680"
BUILT_MODULE_LOCATION[0]="product/rr2680/linux"
DEST_MODULE_LOCATION[0]="/updates/dkms"
